version: '3.8'

services:

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - task-network
    volumes:
      - mongo-data:/data/db

  task-api:
    build: .
    container_name: task-api
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    networks:
      - task-network
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/taskdb

networks:
  task-network:

volumes:
  mongo-data: