apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot

  template:
    metadata:
      labels:
        app: springboot

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: springboot-container
          image: bckdkr/taskmanager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080